services:
  # Fake Dynamics CRM (demo/dev) - with built-in UI
  fake-dynamics:
    build:
      context: ./src
      dockerfile: OrgReg.FakeDynamics/Dockerfile
    ports:
      - "5020:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    restart: unless-stopped

  # Organisation API (informationslager)
  organisation-api:
    build:
      context: ./src
      dockerfile: OrgReg.Organisation.Api/Dockerfile
    ports:
      - "5010:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Dynamics__BaseUrl=http://fake-dynamics:8080
      - Dynamics__TenantId=fake
      - Dynamics__ClientId=fake
      - Dynamics__ClientSecret=fake
      - Dynamics__Resource=http://fake-dynamics:8080
      - Cors__Origins__0=http://localhost:3000
      - Cors__Origins__1=http://localhost:5012
    depends_on:
      - fake-dynamics
      - db
    restart: unless-stopped

  # Avtal API (informationslager)
  avtal-api:
    build:
      context: ./src
      dockerfile: OrgReg.Avtal.Api/Dockerfile
    ports:
      - "5011:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__AvtalDb=Server=db;Database=AvtalDb;User Id=sa;Password=${DB_PASSWORD:-YourStrong!Password};TrustServerCertificate=true
      - Cors__Origins__0=http://localhost:3000
      - Cors__Origins__1=http://localhost:5012
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Admin (intern webbtjanst)
  admin:
    build:
      context: ./src
      dockerfile: OrgReg.Admin/Dockerfile
    ports:
      - "5012:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ApiUrls__OrganisationApi=http://organisation-api:8080
      - ApiUrls__AvtalApi=http://avtal-api:8080
    depends_on:
      - organisation-api
      - avtal-api
    restart: unless-stopped

  # Publik webbtjanst (React/Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5010
    depends_on:
      - organisation-api
    restart: unless-stopped

  # SQL Server (for Avtal)
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD:-YourStrong!Password}
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  sqldata:
